version: 1

paths:
  allow:
    - "src/**"
    - "tests/**"
    - "fixes/**"
    - "error.log"
    - ".vibeguard.yaml"

  deny:
    - ".env"
    - ".env.*"
    - ".git/**"

  require_confirmation: []

commands:
  deny:
    - "rm -rf"
    - "git reset --hard"
    - "git push --force"

  require_confirmation: []
